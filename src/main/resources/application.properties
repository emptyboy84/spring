spring.application.name=demo

# 로컬에서는 application-secret.properties에서 키를 읽음
# 배포(Render)에서는 Environment Variables에서 직접 주입됨
spring.config.import=optional:classpath:application-secret.properties

# MongoDB 연결 주소
spring.data.mongodb.uri=${MONGO_URI}

# 외부 API 키 관리
api.key.public-data=${PUBLIC_DATA_KEY}
api.key.bizno=${BIZNO_KEY}
api.key.dart=${DART_KEY}